{% extends "base.html" %}
{% block content %}
<h2><i class="fas fa-users-cog text-success"></i> 用户管理</h2>
<table class="table table-bordered table-hover">
    <thead class="table-light">
        <tr><th>ID</th><th>用户名</th><th>角色</th><th>操作</th></tr>
    </thead>
    <tbody>
        {% for u in users %}
        <tr>
            <td>{{ u.user_id }}</td>
            <td>{{ u.username }}</td>
            <td><span class="badge bg-secondary">{{ u.role }}</span></td>
            <td>
                {% if u.user_id != session.user_id %}
                <form method="POST" action="{{ url_for('delete_user', user_id=u.user_id) }}" style="display:inline;">
                    <button class="btn btn-sm btn-danger" onclick="return confirm('确定删除该用户？')">删除</button>
                </form>
                {% else %}
                <span class="text-muted">当前账号</span>
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
